<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ASCII Alpha Test</title>
  </head>
  <body>
    <div id="status">running</div>
    <script type="module">
      import { imageToAsciiFrame, renderFrameToCanvas, DEFAULT_OPTIONS } from 'asciify-engine';
      (async () => {
        try {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          // 1x1 transparent PNG
          img.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=';
          await img.decode();

          const width = 120;
          const height = 60;
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          canvas.style.background = 'transparent';

          const dpr = window.devicePixelRatio || 1;
          const ctx = canvas.getContext('2d', { alpha: true });
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          const opts = { ...DEFAULT_OPTIONS, fontSize: 8, renderMode: 'ascii', charAspect: 0.55, colorMode: 'grayscale' };
          const { frame } = imageToAsciiFrame(img, opts, width, height);
          renderFrameToCanvas(ctx, frame, opts, width, height);

          document.body.appendChild(canvas);

          // export PNG and check alpha of top-left pixel
          const dataUrl = canvas.toDataURL('image/png');
          // draw exported PNG into a verifier canvas to ensure encoding preserved alpha
          const verifier = document.createElement('canvas');
          verifier.width = width;
          verifier.height = height;
          const vctx = verifier.getContext('2d', { alpha: true });
          const exported = new Image();
          exported.src = dataUrl;
          await exported.decode();
          vctx.drawImage(exported, 0, 0);
          const imgd = vctx.getImageData(0, 0, 1, 1).data;
          const alpha = imgd[3];
          const out = document.getElementById('status');
          out.textContent = `alpha=${alpha}`;
          console.log('alpha sample', imgd);
        } catch (err) {
          console.error(err);
          document.getElementById('status').textContent = 'error';
        }
      })();
    </script>
  </body>
</html>
